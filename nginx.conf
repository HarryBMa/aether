server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ${MATRIX_DOMAIN};

    ssl_certificate     /certs/nginx.pem;
    ssl_certificate_key /certs/nginx-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ── Aether web app ─────────────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        expires 1h;
    }

    # ── Matrix homeserver ──────────────────────────────────────────────────
    location /_matrix/ {
        proxy_pass http://synapse:8008;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        client_max_body_size 32M;
    }

    # ── SITHS RP (mobile clients connect here for NFC step-up) ────────────
    location /siths/ {
        proxy_pass https://siths-rp:3401/;
        proxy_ssl_certificate     /certs/nginx.pem;
        proxy_ssl_certificate_key /certs/nginx-key.pem;
        proxy_ssl_verify off;    # internal network — siths-rp uses self-signed
    }

    # ── Clinical capture API ───────────────────────────────────────────────
    location /api/capture/ {
        proxy_pass http://capture:3400/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # ── Well-known Matrix federation ──────────────────────────────────────
    location /.well-known/matrix/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        alias /usr/share/nginx/html/well-known/matrix/;
    }
}
